<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="acCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a514b"/>
      <stop offset="1" stop-color="#1b3d38"/>
    </linearGradient>
    <clipPath id="acClip"><rect x="80" y="86" width="156" height="96" rx="14"/></clipPath>
  </defs>
  <style>
    * { transform-box: view-box; }
    @keyframes fl { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes sh { 0% { transform: translateX(-150px) skewX(-20deg); } 55%,100% { transform: translateX(215px) skewX(-20deg); } }
    .stack { animation: fl 4.2s ease-in-out infinite; }
    .shine { animation: sh 4.4s ease-in-out infinite; }
  </style>
  <ellipse cx="150" cy="184" rx="74" ry="10" fill="#1b3d38" opacity=".12"/>
  <g class="stack">
    <g transform="rotate(-15 118 96)">
      <rect x="88" y="50" width="62" height="92" rx="8" fill="#fdfdf5" stroke="#1b3d38" stroke-width="3"/>
      <rect x="98" y="64" width="42" height="6" rx="3" fill="#b7b5f5"/>
      <rect x="98" y="78" width="42" height="6" rx="3" fill="#e0ebe4"/>
      <rect x="98" y="92" width="28" height="6" rx="3" fill="#e0ebe4"/>
      <rect x="98" y="114" width="42" height="6" rx="3" fill="#eef985"/>
    </g>
    <g transform="rotate(8 158 134)">
      <rect x="80" y="86" width="156" height="96" rx="14" fill="url(#acCard)"/>
      <rect x="96" y="104" width="30" height="23" rx="5" fill="#eef985"/>
      <line x1="96" y1="115" x2="126" y2="115" stroke="#1b3d38" stroke-width="2"/>
      <line x1="111" y1="104" x2="111" y2="127" stroke="#1b3d38" stroke-width="2"/>
      <g fill="#f9f9eb">
        <circle cx="100" cy="150" r="4"/><circle cx="112" cy="150" r="4"/><circle cx="124" cy="150" r="4"/>
        <circle cx="142" cy="150" r="4"/><circle cx="154" cy="150" r="4"/><circle cx="166" cy="150" r="4"/>
      </g>
      <rect x="96" y="163" width="58" height="7" rx="3.5" fill="#b7b5f5"/>
      <g clip-path="url(#acClip)">
        <rect class="shine" x="80" y="86" width="38" height="96" fill="#ffffff" opacity=".2"/>
      </g>
    </g>
  </g>
</svg>

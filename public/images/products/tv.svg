<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200" fill="none">
  <defs>
    <linearGradient id="tvScreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef985"/>
      <stop offset="1" stop-color="#b7b5f5"/>
    </linearGradient>
    <clipPath id="tvClip"><rect x="52" y="42" width="176" height="102" rx="9"/></clipPath>
  </defs>
  <style>
    * { transform-box: view-box; }
    @keyframes pl { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
    @keyframes sh { 0% { transform: translateX(-130px) skewX(-18deg); } 55%,100% { transform: translateX(215px) skewX(-18deg); } }
    @keyframes bk { 0%,100% { opacity:1; } 50% { opacity:.3; } }
    .play  { animation: pl 2.2s ease-in-out infinite; transform-origin: 140px 93px; }
    .shine { animation: sh 4s ease-in-out infinite; }
    .rbtn  { animation: bk 1.6s ease-in-out infinite; }
  </style>
  <ellipse cx="138" cy="186" rx="78" ry="10" fill="#1b3d38" opacity=".12"/>
  <rect x="131" y="156" width="18" height="16" fill="#1b3d38"/>
  <rect x="100" y="170" width="80" height="9" rx="4.5" fill="#1b3d38"/>
  <rect x="40" y="28" width="200" height="128" rx="18" fill="#1b3d38"/>
  <rect x="52" y="42" width="176" height="102" rx="9" fill="url(#tvScreen)"/>
  <g clip-path="url(#tvClip)">
    <rect class="shine" x="52" y="42" width="44" height="102" fill="#ffffff" opacity=".32"/>
  </g>
  <g class="play">
    <circle cx="140" cy="93" r="24" fill="#fdfdf5" opacity=".95"/>
    <path d="M133 81 L133 105 L155 93 Z" fill="#1b3d38"/>
  </g>
  <g transform="rotate(14 222 152)">
    <rect x="207" y="118" width="30" height="68" rx="13" fill="#2a514b" stroke="#1b3d38" stroke-width="3"/>
    <circle class="rbtn" cx="222" cy="132" r="6" fill="#eef985"/>
    <circle cx="215" cy="150" r="3" fill="#f9f9eb"/>
    <circle cx="229" cy="150" r="3" fill="#f9f9eb"/>
    <circle cx="215" cy="164" r="3" fill="#f9f9eb"/>
    <circle cx="229" cy="164" r="3" fill="#f9f9eb"/>
  </g>
</svg>
